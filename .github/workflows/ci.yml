name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build / typecheck / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm -r --filter './packages/*' build

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Test workspace
        run: pnpm test

      - name: Run examples (smoke)
        run: |
          pnpm --filter example-basic-search start
          pnpm --filter example-chunking start
          pnpm --filter example-custom-adapter start

  audit:
    name: dependency audit (pnpm audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # `--prod` filters to runtime deps — devDeps are scanned separately
      # at lower severity. SECURITY.md commits to surfacing prod CVEs;
      # this step is what backs that commitment.
      - name: pnpm audit (production deps, high+ severity)
        run: pnpm audit --prod --audit-level=high

      # Run again across all deps but don't fail the build on devDep
      # findings — those are advisory only. Keeps signal high and noise low.
      - name: pnpm audit (all deps, advisory)
        run: pnpm audit --audit-level=low || true

  dependency-review:
    # GitHub-native pre-merge check: any new dep with a known CVE
    # introduced by a PR fails this job. No-op on push events.
    name: dependency review (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # NOTE: CodeQL static analysis is intentionally NOT defined here. The
  # repo uses GitHub's "default setup" for code scanning (configured in
  # the repo Security settings), which runs the CodeQL javascript-typescript
  # query suite automatically on push and PR. An additional advanced-config
  # workflow would conflict at SARIF-upload time:
  #   "CodeQL analyses from advanced configurations cannot be processed
  #    when the default setup is enabled"
  # If you want extra query suites or custom queries, disable default
  # setup in repo Security settings first, then add an advanced workflow
  # back here.
